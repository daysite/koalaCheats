<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koala Cheats - Mi Perfil</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .profile-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        
        .profile-header {
            background: rgba(17, 17, 24, 0.9);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid rgba(16, 185, 129, 0.3);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
        }
        
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a855f7, #10b981);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
        }
        
        .profile-info h2 {
            color: #10b981;
        }
        
        .profile-info p {
            color: #aaa;
        }
        
        .profile-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }
        
        .stat-box {
            background: rgba(17, 17, 24, 0.8);
            padding: 1.5rem;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        
        .stat-box h3 {
            color: #10b981;
            font-size: 2rem;
        }
        
        .stat-box p {
            color: #aaa;
            margin-top: 0.5rem;
        }
        
        .btn-logout-profile {
            background: #ef4444;
            border: none;
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            margin-left: auto;
        }
        
        .btn-logout-profile:hover {
            background: #dc2626;
        }
        
        .orders-table {
            background: rgba(17, 17, 24, 0.8);
            border-radius: 15px;
            padding: 1.5rem;
            margin-top: 2rem;
        }
        
        .orders-table h3 {
            margin-bottom: 1rem;
            color: #10b981;
        }
        
        .orders-table table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .orders-table th {
            text-align: left;
            padding: 0.8rem;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }
        
        .orders-table td {
            padding: 0.8rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .estado-completado { color: #10b981; }
        .estado-pendiente { color: #f59e0b; }
        .estado-cancelado { color: #ef4444; }
        
        .btn-volver-tienda {
            background: linear-gradient(135deg, #a855f7, #ec4899);
            border: none;
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-volver-tienda:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <div class="profile-header">
            <div class="profile-avatar" id="userAvatar">🐨</div>
            <div class="profile-info">
                <h2 id="userName">Usuario</h2>
                <p id="userEmail">email@ejemplo.com</p>
                <p id="userTelefono"><i class="fas fa-phone"></i> +123 456 7890</p>
            </div>
            <button class="btn-logout-profile" onclick="cerrarSesionUsuario()">
                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
            </button>
        </div>
        
        <div class="profile-stats">
            <div class="stat-box">
                <h3 id="totalPedidos">0</h3>
                <p>📦 Pedidos realizados</p>
            </div>
            <div class="stat-box">
                <h3 id="totalGastado">$0</h3>
                <p>💰 Total gastado</p>
            </div>
            <div class="stat-box">
                <h3 id="ultimoPedido">-</h3>
                <p>🕐 Último pedido</p>
            </div>
        </div>
        
        <div class="orders-table">
            <h3>📋 Mis Pedidos</h3>
            <div id="ordersContainer">
                <p>Cargando tus pedidos...</p>
            </div>
        </div>
        
        <div style="margin-top: 2rem; text-align: center;">
            <a href="index.html" class="btn-volver-tienda">
                <i class="fas fa-store"></i> Volver a la Tienda
            </a>
        </div>
    </div>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        // ============================================
        // PERFIL DE USUARIO
        // ============================================
        
        let currentUser = null;
        let userData = null;
        
        // Verificar autenticación
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                await cargarPerfil(user);
            } else {
                // Si no está logueado, redirigir al login
                window.location.href = 'login.html';
            }
        });
        
        async function cargarPerfil(user) {
            // Obtener datos del usuario desde Firebase
            userData = await obtenerDatosUsuario(user.uid);
            
            if (!userData) {
                // Si no hay datos en la DB, crear datos básicos
                userData = {
                    nombre: user.displayName || 'Usuario',
                    email: user.email,
                    telefono: user.phoneNumber || 'No registrado',
                    pedidos: 0,
                    totalGastado: 0
                };
                await actualizarDatosUsuario(user.uid, userData);
            }
            
            // Mostrar datos en la UI
            document.getElementById('userName').textContent = userData.nombre || 'Usuario';
            document.getElementById('userEmail').textContent = userData.email || user.email;
            document.getElementById('userTelefono').innerHTML = `<i class="fas fa-phone"></i> ${userData.telefono || 'No registrado'}`;
            document.getElementById('totalPedidos').textContent = userData.pedidos || 0;
            document.getElementById('totalGastado').textContent = `$${userData.totalGastado || 0}`;
            
            // Obtener y mostrar pedidos
            await cargarPedidos(user.uid);
        }
        
        async function cargarPedidos(uid) {
            const container = document.getElementById('ordersContainer');
            const pedidos = await obtenerVentasUsuario(uid);
            
            if (pedidos.length === 0) {
                container.innerHTML = `
                    <p style="text-align: center; padding: 2rem; color: #aaa;">
                        <i class="fas fa-shopping-bag" style="font-size: 2rem; display: block; margin-bottom: 1rem;"></i>
                        Aún no tienes pedidos. ¡Realiza tu primera compra!
                    </p>
                `;
                return;
            }
            
            // Ordenar por fecha (más reciente primero)
            pedidos.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
            
            // Mostrar último pedido
            const ultimo = pedidos[0];
            document.getElementById('ultimoPedido').textContent = new Date(ultimo.fecha).toLocaleDateString();
            
            // Crear tabla
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Productos</th>
                            <th>Total</th>
                            <th>Fecha</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            pedidos.forEach(pedido => {
                const estadoClass = {
                    'completado': 'estado-completado',
                    'pendiente': 'estado-pendiente',
                    'cancelado': 'estado-cancelado'
                }[pedido.estado] || '';
                
                html += `
                    <tr>
                        <td>#${pedido.id}</td>
                        <td>${pedido.productos.join(', ')}</td>
                        <td>$${pedido.total.toFixed(2)}</td>
                        <td>${new Date(pedido.fecha).toLocaleString()}</td>
                        <td class="${estadoClass}">${pedido.estado}</td>
                    </tr>
                `;
            });
            
            html += `</tbody></table>`;
            container.innerHTML = html;
        }
        
        async function cerrarSesionUsuario() {
            const result = await cerrarSesion();
            if (result.success) {
                window.location.href = 'login.html';
            } else {
                alert('❌ Error al cerrar sesión: ' + result.error);
            }
        }
    </script>
</body>
</html>

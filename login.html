<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koala Cheats - Iniciar Sesión</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background: linear-gradient(135deg, #0a0a0f, #1a1a2e);
        }
        
        .auth-box {
            background: rgba(17, 17, 24, 0.9);
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid rgba(16, 185, 129, 0.3);
            max-width: 420px;
            width: 100%;
        }
        
        .auth-box h1 {
            text-align: center;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #a855f7, #10b981);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .auth-box .logo {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        
        .form-group {
            margin-bottom: 1.2rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #aaa;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.8rem;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #10b981;
        }
        
        .btn-auth {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            border: none;
            color: white;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn-auth:hover {
            transform: scale(1.02);
        }
        
        .auth-links {
            text-align: center;
            margin-top: 1.5rem;
            color: #aaa;
        }
        
        .auth-links a {
            color: #10b981;
            text-decoration: none;
        }
        
        .auth-links a:hover {
            text-decoration: underline;
        }
        
        .auth-error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }
        
        .auth-success {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }
        
        .form-hidden {
            display: none;
        }
        
        .google-btn {
            width: 100%;
            padding: 0.8rem;
            background: white;
            color: #333;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: transform 0.2s;
        }
        
        .google-btn:hover {
            transform: scale(1.02);
        }
        
        .google-btn i {
            color: #ea4335;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="logo">🐨</div>
            <h1>Koala Cheats</h1>
            
            <div id="authError" class="auth-error"></div>
            <div id="authSuccess" class="auth-success"></div>
            
            <!-- Formulario de Inicio de Sesión -->
            <form id="loginForm">
                <h2 style="text-align: center; color: white; margin-bottom: 1.5rem;">Iniciar Sesión</h2>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="loginEmail" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Contraseña</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-auth">Ingresar</button>
                
                <button type="button" class="google-btn" onclick="loginWithGoogle()">
                    <i class="fab fa-google"></i> Continuar con Google
                </button>
                
                <div class="auth-links">
                    <p>¿No tienes cuenta? <a href="#" onclick="toggleForm()">Regístrate aquí</a></p>
                    <p><a href="#" onclick="recuperarPassword()">¿Olvidaste tu contraseña?</a></p>
                </div>
            </form>
            
            <!-- Formulario de Registro -->
            <form id="registerForm" class="form-hidden">
                <h2 style="text-align: center; color: white; margin-bottom: 1.5rem;">Crear Cuenta</h2>
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Nombre completo</label>
                    <input type="text" id="registerNombre" placeholder="Tu nombre" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="registerEmail" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Teléfono (WhatsApp)</label>
                    <input type="text" id="registerTelefono" placeholder="+123 456 7890">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Contraseña (mínimo 6 caracteres)</label>
                    <input type="password" id="registerPassword" placeholder="••••••••" minlength="6" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-check"></i> Confirmar contraseña</label>
                    <input type="password" id="registerConfirmPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-auth">Registrarse</button>
                
                <div class="auth-links">
                    <p>¿Ya tienes cuenta? <a href="#" onclick="toggleForm()">Inicia sesión</a></p>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        // ============================================
        // FUNCIONES DE LOGIN
        // ============================================
        
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const authError = document.getElementById('authError');
        const authSuccess = document.getElementById('authSuccess');
        
        function showError(mensaje) {
            authError.textContent = mensaje;
            authError.style.display = 'block';
            authSuccess.style.display = 'none';
            setTimeout(() => {
                authError.style.display = 'none';
            }, 5000);
        }
        
        function showSuccess(mensaje) {
            authSuccess.textContent = mensaje;
            authSuccess.style.display = 'block';
            authError.style.display = 'none';
            setTimeout(() => {
                authSuccess.style.display = 'none';
            }, 5000);
        }
        
        function toggleForm() {
            loginForm.classList.toggle('form-hidden');
            registerForm.classList.toggle('form-hidden');
            authError.style.display = 'none';
            authSuccess.style.display = 'none';
        }
        
        // ============================================
        // INICIO DE SESIÓN - GUARDA EN LOCALSTORAGE
        // ============================================
        
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            const result = await iniciarSesion(email, password);
            
            if (result.success) {
                // GUARDAR SESIÓN EN LOCALSTORAGE
                localStorage.setItem('firebaseUser', JSON.stringify({
                    uid: result.user.uid,
                    email: result.user.email,
                    nombre: result.user.displayName || 'Usuario'
                }));
                
                showSuccess('✅ ¡Bienvenido! Redirigiendo...');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                showError('❌ ' + result.error);
            }
        });
        
        // ============================================
        // REGISTRO - GUARDA EN LOCALSTORAGE
        // ============================================
        
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const nombre = document.getElementById('registerNombre').value;
            const email = document.getElementById('registerEmail').value;
            const telefono = document.getElementById('registerTelefono').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;
            
            if (password !== confirmPassword) {
                showError('❌ Las contraseñas no coinciden');
                return;
            }
            
            if (password.length < 6) {
                showError('❌ La contraseña debe tener al menos 6 caracteres');
                return;
            }
            
            const result = await registrarUsuario(email, password, nombre, telefono);
            
            if (result.success) {
                // GUARDAR SESIÓN EN LOCALSTORAGE
                localStorage.setItem('firebaseUser', JSON.stringify({
                    uid: result.user.uid,
                    email: result.user.email,
                    nombre: nombre
                }));
                
                showSuccess('✅ ¡Registro exitoso! Redirigiendo...');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            } else {
                showError('❌ ' + result.error);
            }
        });
        
        // ============================================
        // LOGIN CON GOOGLE - GUARDA EN LOCALSTORAGE
        // ============================================
        
        async function loginWithGoogle() {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await auth.signInWithPopup(provider);
                const user = result.user;
                
                // Guardar en Firebase Database si es nuevo
                const userData = await obtenerDatosUsuario(user.uid);
                if (!userData) {
                    await db.ref('usuarios/' + user.uid).set({
                        nombre: user.displayName || 'Usuario Google',
                        email: user.email,
                        telefono: user.phoneNumber || '',
                        fechaRegistro: new Date().toISOString(),
                        rol: 'cliente',
                        pedidos: 0,
                        totalGastado: 0,
                        foto: user.photoURL || ''
                    });
                }
                
                // GUARDAR SESIÓN EN LOCALSTORAGE
                localStorage.setItem('firebaseUser', JSON.stringify({
                    uid: user.uid,
                    email: user.email,
                    nombre: user.displayName || 'Usuario Google'
                }));
                
                showSuccess('✅ ¡Bienvenido! Redirigiendo...');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } catch (error) {
                showError('❌ Error al iniciar con Google: ' + error.message);
            }
        }
        
        // ============================================
        // RECUPERAR CONTRASEÑA
        // ============================================
        
        async function recuperarPassword() {
            const email = prompt('📧 Ingresa tu email para recuperar tu contraseña:');
            if (email) {
                const result = await recuperarContrasena(email);
                if (result.success) {
                    showSuccess('✅ Revisa tu email. Te hemos enviado instrucciones.');
                } else {
                    showError('❌ ' + result.error);
                }
            }
        }
        
        // ============================================
        // VERIFICAR SI YA ESTÁ LOGUEADO
        // ============================================
        
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                // Si ya está logueado, ir directo a la tienda
                localStorage.setItem('firebaseUser', JSON.stringify({
                    uid: user.uid,
                    email: user.email,
                    nombre: user.displayName || 'Usuario'
                }));
                window.location.href = 'index.html';
            }
        });
        
        // ============================================
        // EXPORTAR FUNCIONES GLOBALES
        // ============================================
        
        window.toggleForm = toggleForm;
        window.recuperarPassword = recuperarPassword;
        window.loginWithGoogle = loginWithGoogle;
    </script>
</body>
</html>
